<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient - warm cream to light gold -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f0e0"/>
      <stop offset="50%" stop-color="#f4ecd8"/>
      <stop offset="100%" stop-color="#ebe0c8"/>
    </linearGradient>

    <!-- Book cover gradient - rich leather brown -->
    <linearGradient id="coverGrad" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#5a4228"/>
      <stop offset="40%" stop-color="#4a3520"/>
      <stop offset="100%" stop-color="#3d3229"/>
    </linearGradient>

    <!-- Left page gradient -->
    <linearGradient id="leftPageGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f9f4e8"/>
      <stop offset="70%" stop-color="#faf6ee"/>
      <stop offset="100%" stop-color="#f0e8d4"/>
    </linearGradient>

    <!-- Right page gradient -->
    <linearGradient id="rightPageGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#eee6d0"/>
      <stop offset="30%" stop-color="#f8f2e6"/>
      <stop offset="100%" stop-color="#f5eedc"/>
    </linearGradient>

    <!-- Gold accent gradient -->
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c4a035"/>
      <stop offset="50%" stop-color="#8b6914"/>
      <stop offset="100%" stop-color="#a07818"/>
    </linearGradient>

    <!-- Spine gradient -->
    <linearGradient id="spineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a3520"/>
      <stop offset="50%" stop-color="#5c4430"/>
      <stop offset="100%" stop-color="#4a3520"/>
    </linearGradient>

    <!-- Subtle inner shadow for pages -->
    <filter id="pageShadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="6" flood-color="#3d3229" flood-opacity="0.15"/>
    </filter>

    <!-- Book shadow -->
    <filter id="bookShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#3d3229" flood-opacity="0.35"/>
    </filter>

    <!-- Subtle glow for the letter -->
    <filter id="letterGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#8b6914" flood-opacity="0.3"/>
    </filter>

    <!-- Rounded square clip path for macOS style -->
    <clipPath id="iconClip">
      <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228"/>
    </clipPath>

    <!-- Page texture pattern -->
    <pattern id="pageTexture" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#f5eedc" fill-opacity="0"/>
      <rect x="0" y="0" width="1" height="1" fill="#e8dfc8" fill-opacity="0.08"/>
      <rect x="2" y="2" width="1" height="1" fill="#e8dfc8" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <!-- Clipped rounded square -->
  <g clip-path="url(#iconClip)">

    <!-- Background fill -->
    <rect width="1024" height="1024" fill="url(#bgGrad)"/>

    <!-- Subtle radial highlight in center -->
    <radialGradient id="centerGlow" cx="0.5" cy="0.45" r="0.5">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <rect width="1024" height="1024" fill="url(#centerGlow)"/>

    <!-- Subtle border/edge darkening -->
    <radialGradient id="edgeDarken" cx="0.5" cy="0.5" r="0.7">
      <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#3d3229" stop-opacity="0.08"/>
    </radialGradient>
    <rect width="1024" height="1024" fill="url(#edgeDarken)"/>

    <!-- Book group - slightly angled and centered -->
    <g filter="url(#bookShadow)" transform="translate(512, 490) rotate(-2) translate(-512, -490)">

      <!-- === BACK COVER (bottom layer) === -->
      <path d="
        M 220 260
        L 220 740
        Q 220 760 240 760
        L 800 760
        Q 820 760 820 740
        L 820 280
        Q 820 260 800 260
        Z
      " fill="url(#coverGrad)" stroke="#2e2418" stroke-width="2"/>

      <!-- Back cover decorative border -->
      <rect x="235" y="275" width="570" height="470" rx="4" ry="4"
            fill="none" stroke="#8b6914" stroke-width="1.5" stroke-opacity="0.3"/>

      <!-- === PAGES BLOCK (middle layer) === -->
      <!-- Multiple page edges for depth effect -->
      <g>
        <!-- Page edges (visible from the side/bottom) -->
        <path d="
          M 238 270
          L 238 738
          Q 238 748 248 748
          L 792 748
          Q 802 748 802 738
          L 802 270
        " fill="#e8dfca" stroke="#d4c9b0" stroke-width="0.5"/>

        <!-- Individual page edge lines -->
        <line x1="238" y1="744" x2="802" y2="744" stroke="#d4c9b0" stroke-width="0.5"/>
        <line x1="238" y1="740" x2="802" y2="740" stroke="#d8ceb8" stroke-width="0.5"/>
        <line x1="238" y1="736" x2="802" y2="736" stroke="#d4c9b0" stroke-width="0.5"/>
        <line x1="238" y1="732" x2="802" y2="732" stroke="#d8ceb8" stroke-width="0.5"/>
      </g>

      <!-- === OPEN BOOK PAGES === -->
      <g filter="url(#pageShadow)">
        <!-- Left page -->
        <path d="
          M 250 270
          Q 250 268 252 266
          L 505 256
          L 505 726
          L 252 736
          Q 250 736 250 734
          Z
        " fill="url(#leftPageGrad)"/>
        <path d="
          M 250 270
          Q 250 268 252 266
          L 505 256
          L 505 726
          L 252 736
          Q 250 736 250 734
          Z
        " fill="url(#pageTexture)"/>

        <!-- Right page -->
        <path d="
          M 505 256
          L 778 266
          Q 780 266 780 268
          L 780 734
          Q 780 736 778 736
          L 505 726
          Z
        " fill="url(#rightPageGrad)"/>
        <path d="
          M 505 256
          L 778 266
          Q 780 266 780 268
          L 780 734
          Q 780 736 778 736
          L 505 726
          Z
        " fill="url(#pageTexture)"/>

        <!-- Center spine fold line -->
        <line x1="505" y1="256" x2="505" y2="726" stroke="#c8bda5" stroke-width="2.5" stroke-opacity="0.6"/>
        <line x1="506" y1="256" x2="506" y2="726" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.4"/>
        <line x1="504" y1="256" x2="504" y2="726" stroke="#b8a890" stroke-width="0.5" stroke-opacity="0.3"/>
      </g>

      <!-- === FRONT COVER (top layer, slightly open) === -->
      <path d="
        M 210 250
        L 210 730
        Q 210 750 230 750
        L 510 750
        L 510 250
        Q 510 248 508 248
        L 230 248
        Q 210 248 210 250
        Z
      " fill="url(#coverGrad)" stroke="#2e2418" stroke-width="2"/>

      <!-- Front cover inner decorative frame -->
      <rect x="226" y="264" width="270" height="470" rx="6" ry="6"
            fill="none" stroke="#8b6914" stroke-width="2" stroke-opacity="0.5"/>
      <rect x="232" y="270" width="258" height="458" rx="4" ry="4"
            fill="none" stroke="#8b6914" stroke-width="1" stroke-opacity="0.3"/>

      <!-- Front cover title area - decorative gold lines -->
      <line x1="260" y1="340" x2="470" y2="340" stroke="#8b6914" stroke-width="1.5" stroke-opacity="0.5"/>
      <line x1="280" y1="355" x2="450" y2="355" stroke="#8b6914" stroke-width="1" stroke-opacity="0.35"/>

      <!-- Small decorative diamond on cover -->
      <path d="M 365 390 L 372 400 L 365 410 L 358 400 Z"
            fill="#8b6914" fill-opacity="0.4"/>

      <!-- Cover spine detail -->
      <rect x="505" y="248" width="12" height="502" fill="url(#spineGrad)"/>
      <line x1="508" y1="248" x2="508" y2="750" stroke="#8b6914" stroke-width="0.5" stroke-opacity="0.3"/>
      <line x1="514" y1="248" x2="514" y2="750" stroke="#8b6914" stroke-width="0.5" stroke-opacity="0.3"/>

    </g>

    <!-- === TEXT LINES ON VISIBLE RIGHT PAGE === -->
    <g transform="translate(512, 490) rotate(-2) translate(-512, -490)" opacity="0.3">
      <!-- Simulated text lines on the right page -->
      <line x1="530" y1="310" x2="750" y2="316" stroke="#8b7a5e" stroke-width="2" stroke-linecap="round"/>
      <line x1="530" y1="335" x2="730" y2="340" stroke="#8b7a5e" stroke-width="2" stroke-linecap="round"/>
      <line x1="530" y1="360" x2="755" y2="365" stroke="#8b7a5e" stroke-width="2" stroke-linecap="round"/>
      <line x1="530" y1="385" x2="710" y2="390" stroke="#8b7a5e" stroke-width="2" stroke-linecap="round"/>
      <line x1="530" y1="410" x2="745" y2="415" stroke="#8b7a5e" stroke-width="2" stroke-linecap="round"/>
      <line x1="530" y1="435" x2="720" y2="440" stroke="#8b7a5e" stroke-width="2" stroke-linecap="round"/>

      <!-- Gap for paragraph break -->
      <line x1="530" y1="475" x2="755" y2="480" stroke="#8b7a5e" stroke-width="2" stroke-linecap="round"/>
      <line x1="530" y1="500" x2="735" y2="505" stroke="#8b7a5e" stroke-width="2" stroke-linecap="round"/>
      <line x1="530" y1="525" x2="750" y2="530" stroke="#8b7a5e" stroke-width="2" stroke-linecap="round"/>
      <line x1="530" y1="550" x2="700" y2="555" stroke="#8b7a5e" stroke-width="2" stroke-linecap="round"/>
      <line x1="530" y1="575" x2="740" y2="580" stroke="#8b7a5e" stroke-width="2" stroke-linecap="round"/>
      <line x1="530" y1="600" x2="760" y2="605" stroke="#8b7a5e" stroke-width="2" stroke-linecap="round"/>
      <line x1="530" y1="625" x2="715" y2="630" stroke="#8b7a5e" stroke-width="2" stroke-linecap="round"/>
      <line x1="530" y1="650" x2="745" y2="655" stroke="#8b7a5e" stroke-width="2" stroke-linecap="round"/>
      <line x1="530" y1="675" x2="680" y2="680" stroke="#8b7a5e" stroke-width="2" stroke-linecap="round"/>
    </g>

    <!-- === ELEGANT "A" LETTER ON LEFT PAGE === -->
    <g transform="translate(512, 490) rotate(-2) translate(-512, -490)" filter="url(#letterGlow)">
      <text x="365" y="540"
            font-family="Georgia, 'Times New Roman', serif"
            font-size="220"
            font-weight="normal"
            font-style="italic"
            fill="url(#goldGrad)"
            text-anchor="middle"
            opacity="0.7">A</text>
    </g>

    <!-- === DECORATIVE BOOKMARK RIBBON === -->
    <g transform="translate(512, 490) rotate(-2) translate(-512, -490)">
      <path d="
        M 620 248
        L 620 210
        Q 620 205 625 205
        L 645 205
        Q 650 205 650 210
        L 650 248
      " fill="#a03030" stroke="#8a2020" stroke-width="1"/>
      <!-- Ribbon V-cut at top (visible part sticking out) -->
      <path d="
        M 620 205
        L 635 218
        L 650 205
      " fill="url(#bgGrad)"/>
      <!-- Ribbon hanging below (between pages) -->
      <path d="
        M 622 750
        L 622 790
        L 635 778
        L 648 790
        L 648 750
      " fill="#a03030" stroke="#8a2020" stroke-width="1" stroke-linejoin="round"/>
    </g>

    <!-- === SUBTLE BOTTOM DECORATIVE ELEMENT === -->
    <g opacity="0.5">
      <text x="512" y="920"
            font-family="Georgia, 'Times New Roman', serif"
            font-size="28"
            font-weight="normal"
            letter-spacing="8"
            fill="#8b6914"
            text-anchor="middle"
            opacity="0.5">ENGLISH READER</text>

      <!-- Small decorative lines flanking the text -->
      <line x1="310" y1="912" x2="370" y2="912" stroke="#8b6914" stroke-width="1" stroke-opacity="0.4"/>
      <line x1="654" y1="912" x2="714" y2="912" stroke="#8b6914" stroke-width="1" stroke-opacity="0.4"/>
    </g>

  </g>
</svg>